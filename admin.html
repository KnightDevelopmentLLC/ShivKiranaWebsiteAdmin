<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shiv Kirana | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="navbar">
    <div class="container nav-content">
      <div class="brand">Shiv Kirana Admin</div>
      <div></div>
      <span class="muted">Dashboard</span>
    </div>
  </header>

  <main class="container admin-wrap">
    <div class="admin-grid">
      <section class="panel">
        <h3 style="margin-top:0;">Category Management</h3>
        <p class="muted">Add and manage grocery categories shown on customer site.</p>
        <div style="display:flex; gap:0.5rem;">
          <input id="catInput" class="input" placeholder="e.g. Fruits" />
          <button id="addCategory" class="btn btn-primary">Add</button>
        </div>
        <p id="categoryStatus" class="muted" style="margin:0.65rem 0 0;"></p>
        <div id="categoryList" style="margin-top:0.8rem;"></div>
      </section>

      <section class="panel">
        <h3 style="margin-top:0;">Product Management</h3>
        <p class="muted">Upload product image to Cloudinary and save product to Firestore.</p>
        <div class="form-grid">
          <input id="pName" class="input" placeholder="Product name" />
          <select id="pCategory" class="input"></select>
          <input id="pPrice" class="input" type="number" min="1" placeholder="Price in ₹" />
          <input id="pQty" class="input" type="number" min="0" placeholder="Quantity" />
          <input id="pImage" class="input" type="file" accept="image/*" />
          <button id="addProduct" class="btn btn-primary">Upload & Add Product</button>
          <p id="adminStatus" class="muted"></p>
        </div>
      </section>
    </div>

    <section class="panel" style="margin-top:1rem;">
      <h3 style="margin-top:0;">Current Products</h3>
      <table class="table">
        <thead>
          <tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Action</th></tr>
        </thead>
        <tbody id="productRows"></tbody>
      </table>
    </section>
  </main>

  <script type="module" src="admin.js"></script>
</body>
</html>
